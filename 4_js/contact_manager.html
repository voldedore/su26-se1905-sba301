<html>
    <head>
        <title>Contact Manager</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>
    <body>
        <div class="container mt-4">
            <h1 class="mb-4">Contact Manager</h1>

            <div class="card mb-4">
                <div class="card-header">Add New Contact</div>
                <div class="card-body">
                    <form id="contactForm" onsubmit="fnName">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="name" class="form-label"
                                    >Full Name</label
                                >
                                <input
                                    type="text"
                                    class="form-control"
                                    id="name"
                                    required
                                />
                            </div>
                            <div class="col-md-6">
                                <label for="tel" class="form-label"
                                    >Phone</label
                                >
                                <input
                                    type="tel"
                                    class="form-control"
                                    id="tel"
                                    required
                                />
                            </div>
                            <div class="col-md-6">
                                <label for="address" class="form-label"
                                    >Address</label
                                >
                                <input
                                    type="text"
                                    class="form-control"
                                    id="address"
                                />
                            </div>
                            <div class="col-md-6">
                                <label for="dob" class="form-label"
                                    >Date of Birth</label
                                >
                                <input
                                    type="date"
                                    class="form-control"
                                    id="dob"
                                />
                            </div>
                        </div>
                        <button
                            type="submit"
                            class="btn btn-primary mt-3"
                            id="submitBtn"
                            onclick=""
                        >
                            Add
                        </button>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Contact List</div>
                <div class="card-body">
                    <table class="table table-bordered table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Full Name</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Date of Birth</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="contactTableBody">
                            <tr>
                                <td colspan="6" class="text-center">
                                    No contacts yet.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <script src="contact_manager.js"></script>
    </body>
</html>

spring.application.name=sba
# Connection URL for SQL Server using the Microsoft JDBC driver
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Chinook_HSF;encrypt=false;

# Database username and password
spring.datasource.username=sa
spring.datasource.password=123456-aA

# Use the Microsoft SQL Server JDBC driver
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate settings suitable for Microsoft SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.show_sql=true

# Physical naming strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl